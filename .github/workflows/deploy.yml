name: Build and Deploy to Coolify

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/youruser/custom-frappe
  CACHE_REF: ghcr.io/youruser/custom-frappe:buildcache

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare tags
        id: prep
        run: |
          echo "date_tag=$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          # apps.json is passed as a BuildKit secret (matches Dockerfile).
          # APPS_PRIVATE_TOKEN: optional repo secret with read access to any
          # private apps in apps.json. Default GITHUB_TOKEN can't read other
          # repos. Names starting with GITHUB_ are reserved by GitHub.
          # Skip the secret if you have no private apps; the Dockerfile
          # gracefully no-ops when github_token is empty.
          secret-files: |
            apps_json=apps.json
          secrets: |
            github_token=${{ secrets.APPS_PRIVATE_TOKEN }}
          build-args: |
            FRAPPE_BRANCH=develop
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:develop
            ${{ env.IMAGE_NAME }}:develop-${{ steps.prep.outputs.date_tag }}
            ${{ env.IMAGE_NAME }}:develop-${{ steps.prep.outputs.sha_tag }}
          cache-from: type=registry,ref=${{ env.CACHE_REF }}
          cache-to: type=registry,ref=${{ env.CACHE_REF }},mode=max

      - name: Trigger Coolify deploy
        env:
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "$COOLIFY_WEBHOOK_URL" ] || [ -z "$COOLIFY_TOKEN" ]; then
            echo "::error::COOLIFY_WEBHOOK_URL or COOLIFY_TOKEN secret is not set"
            exit 1
          fi
          # Strip any whitespace or stray CR/LF that may have slipped into the secret
          url=$(printf '%s' "$COOLIFY_WEBHOOK_URL" | tr -d '[:space:]')
          # Sanity print: scheme + host only, never the full URL or token
          scheme=$(printf '%s' "$url" | sed -E 's#^([a-z]+)://.*#\1#')
          host=$(printf '%s' "$url" | sed -E 's#^[a-z]+://([^/?]+).*#\1#')
          echo "Calling Coolify deploy webhook: scheme=$scheme host=$host url_length=${#url}"
          response=$(curl -sS -o /tmp/coolify_response.json -w "%{http_code}" \
            -X GET --url "$url" \
            -H "Authorization: Bearer $COOLIFY_TOKEN")
          echo "Coolify response (HTTP $response):"
          cat /tmp/coolify_response.json || true
          echo
          if [ "$response" -lt 200 ] || [ "$response" -ge 300 ]; then
            exit 1
          fi
