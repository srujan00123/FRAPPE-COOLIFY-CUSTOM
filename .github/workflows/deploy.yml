name: Build and Deploy to Coolify

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/youruser/custom-frappe

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare build args
        id: prep
        run: |
          APPS_JSON_BASE64=$(base64 -w 0 apps.json)
          echo "apps_json_base64=$APPS_JSON_BASE64" >> "$GITHUB_OUTPUT"
          echo "date_tag=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            APPS_JSON_BASE64=${{ steps.prep.outputs.apps_json_base64 }}
            FRAPPE_BRANCH=develop
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:develop
            ${{ env.IMAGE_NAME }}:develop-${{ steps.prep.outputs.date_tag }}
            ${{ env.IMAGE_NAME }}:develop-${{ steps.prep.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
