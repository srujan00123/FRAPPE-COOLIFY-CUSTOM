# Map subdomain hostnames to the actual Frappe site name.
# This allows helpdesk.example.com and crm.example.com to resolve
# to the erp.example.com site in Frappe.
#
# To add more subdomains, add entries below in the format:
#   subdomain.example.com  actual-site.example.com;

map $host $frappe_site {
    default $host;

    # example.com subdomains
    helpdesk.example.com erp.example.com;
    crm.example.com      erp.example.com;
}
